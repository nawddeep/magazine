<svg width="400" height="533" viewBox="0 0 400 533" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="533" fill="url(#grad2)"/>
  
  <!-- Geometric pattern -->
  <g opacity="0.1">
    <line x1="0" y1="0" x2="400" y2="533" stroke="#ffffff" stroke-width="1"/>
    <line x1="400" y1="0" x2="0" y2="533" stroke="#ffffff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="533" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="266" x2="400" y2="266" stroke="#ffffff" stroke-width="1"/>
  </g>
  
  <!-- Magazine title -->
  <text x="200" y="140" font-family="Arial, sans-serif" font-size="68" font-weight="300" fill="#ffffff" text-anchor="middle" letter-spacing="12">ELLENNA</text>
  <text x="200" y="175" font-family="Arial, sans-serif" font-size="16" fill="#c0c0c0" text-anchor="middle" letter-spacing="8">MAGAZINE</text>
  
  <!-- Accent line -->
  <rect x="120" y="190" width="160" height="3" fill="#ffffff"/>
  
  <!-- Fashion icon - minimalist dress silhouette -->
  <g transform="translate(200, 300)">
    <!-- Dress outline -->
    <path d="M-20,-40 L-15,-35 L-15,20 L-25,50 L25,50 L15,20 L15,-35 L20,-40 Z" fill="none" stroke="#ffffff" stroke-width="2"/>
    <!-- Accent dots -->
    <circle cx="-25" cy="25" r="2" fill="#ffffff"/>
    <circle cx="25" cy="25" r="2" fill="#ffffff"/>
  </g>
  
  <!-- Issue features -->
  <text x="200" y="390" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle" letter-spacing="2">FASHION FORWARD</text>
  <text x="200" y="410" font-family="Arial, sans-serif" font-size="11" fill="#c0c0c0" text-anchor="middle" letter-spacing="2">DESIGNER INTERVIEWS</text>
  <text x="200" y="430" font-family="Arial, sans-serif" font-size="11" fill="#c0c0c0" text-anchor="middle" letter-spacing="2">TREND ANALYSIS</text>
  
  <!-- Issue info -->
  <rect x="130" y="460" width="140" height="1" fill="#ffffff" opacity="0.5"/>
  <text x="200" y="485" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">JUNE 2024</text>
  <text x="200" y="505" font-family="Arial, sans-serif" font-size="10" fill="#c0c0c0" text-anchor="middle">ISSUE 003</text>
  
  <!-- Corner accents -->
  <line x1="30" y1="30" x2="60" y2="30" stroke="#ffffff" stroke-width="2"/>
  <line x1="30" y1="30" x2="30" y2="60" stroke="#ffffff" stroke-width="2"/>
  <line x1="370" y1="30" x2="340" y2="30" stroke="#ffffff" stroke-width="2"/>
  <line x1="370" y1="30" x2="370" y2="60" stroke="#ffffff" stroke-width="2"/>
  <line x1="30" y1="503" x2="60" y2="503" stroke="#ffffff" stroke-width="2"/>
  <line x1="30" y1="503" x2="30" y2="473" stroke="#ffffff" stroke-width="2"/>
  <line x1="370" y1="503" x2="340" y2="503" stroke="#ffffff" stroke-width="2"/>
  <line x1="370" y1="503" x2="370" y2="473" stroke="#ffffff" stroke-width="2"/>
</svg>
