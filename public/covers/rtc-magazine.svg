<svg width="400" height="533" viewBox="0 0 400 533" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="533" fill="#1a1a2e"/>
  <rect x="20" y="20" width="360" height="493" fill="#16213e"/>
  
  <!-- Circuit pattern background -->
  <g opacity="0.15">
    <path d="M50 100 L150 100 L150 150 M150 125 L250 125 M250 100 L250 200 L200 200" stroke="#0f3460" stroke-width="2"/>
    <circle cx="150" cy="100" r="5" fill="#0f3460"/>
    <circle cx="250" cy="125" r="5" fill="#0f3460"/>
    <circle cx="200" cy="200" r="5" fill="#0f3460"/>
  </g>
  
  <!-- Magazine title -->
  <text x="200" y="120" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#e94560" text-anchor="middle">RTC</text>
  <text x="200" y="160" font-family="Arial, sans-serif" font-size="28" fill="#0f3460" text-anchor="middle" letter-spacing="8">MAGAZINE</text>
  
  <!-- Issue info -->
  <rect x="140" y="190" width="120" height="2" fill="#e94560"/>
  <text x="200" y="230" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle">October 2005</text>
  <text x="200" y="255" font-family="Arial, sans-serif" font-size="14" fill="#0f3460" text-anchor="middle">Issue #001</text>
  
  <!-- Tech icon -->
  <g transform="translate(200, 320)">
    <rect x="-40" y="-30" width="80" height="60" rx="4" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
    <rect x="-30" y="-20" width="20" height="15" fill="#e94560"/>
    <rect x="10" y="-20" width="20" height="15" fill="#e94560"/>
    <rect x="-30" y="5" width="60" height="3" fill="#e94560"/>
    <rect x="-30" y="12" width="60" height="3" fill="#e94560"/>
    <rect x="-30" y="19" width="40" height="3" fill="#e94560"/>
  </g>
  
  <!-- Topics -->
  <text x="200" y="420" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">SOFTWARE DEVELOPMENT</text>
  <text x="200" y="440" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">HARDWARE REVIEWS</text>
  <text x="200" y="460" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">INDUSTRY INSIGHTS</text>
  
  <!-- Border decoration -->
  <rect x="20" y="20" width="360" height="493" stroke="#e94560" stroke-width="2" fill="none"/>
</svg>
